[icloud]
# notmuch-backed view so each folder can filter out Gmail-POP'd mail.
# Physical files still live under Mail/icloud/ (mbsync target).
source = notmuch:///home/aerc/Mail
maildir-store = /home/aerc/Mail
query-map = /home/aerc/.config/aerc/notmuch-querymap-icloud
folders = INBOX,Archive,Drafts,Junk
multi-file-strategy = act-one
outgoing = smtp+insecure+none://mail.example.com:1587
default = INBOX
from = Your Name <you@example.com>
aliases = Your Name <you@icloud.com>
check-mail-cmd = flock /home/aerc/.config/aerc/.sync.lock sh /home/aerc/.config/aerc/scripts/sync-icloud.sh
check-mail-timeout = 5m
check-mail = 0

[gmail]
# notmuch-backed view: shows only messages to/from you@gmail.com across
# the indexed mail store. Replies from this tab use Gmail envelope-from →
# relay routes to smtp.gmail.com.
source = notmuch:///home/aerc/Mail
maildir-store = /home/aerc/Mail
query-map = /home/aerc/.config/aerc/notmuch-querymap-gmail
folders = INBOX,Archive,Drafts,Junk
multi-file-strategy = act-one
default = INBOX
outgoing = smtp+insecure+none://mail.example.com:1587
from = Your Name <you@gmail.com>
check-mail-cmd = flock /home/aerc/.config/aerc/.sync.lock sh /home/aerc/.config/aerc/scripts/sync-icloud.sh
check-mail-timeout = 5m
check-mail = 0

[work]
source = maildir:///home/aerc/Mail/work
outgoing = smtp+insecure+none://mail.example.com:1587
default = INBOX
from = Your Name <you@university.edu>
aliases = Your Name <you-alias@university.edu>
check-mail-cmd = flock /home/aerc/.config/aerc/.sync.lock sh /home/aerc/.config/aerc/scripts/sync-work.sh
check-mail-timeout = 5m
check-mail = 0

[archive]
source = notmuch:///home/aerc/Mail
maildir-store = /home/aerc/Mail
query-map = /home/aerc/.config/aerc/notmuch-querymap
folders = pers,work,local_trash
multi-file-strategy = act-one
default = pers
from = Your Name <you@example.com>
check-mail-cmd = notmuch new --quiet
check-mail-timeout = 5m
check-mail = 0
